<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMINARY — Lunar Landing Sim</title>
  </head>
  <body>
    <div id="app">
      <canvas id="viewport" aria-label="Lunar landing viewport"></canvas>
      <div class="vignette" aria-hidden="true"></div>

      <header class="brand-bar">
        <div class="brand">
          <p class="brand-mark">LUMINARY</p>
          <p class="brand-sub">LM-99 descent autopilot</p>
        </div>
        <div class="run-controls">
          <output
            id="performance-monitor"
            class="performance-monitor"
            aria-label="Rendering performance"
            title="Live rendering performance"
          >
            Measuring…
          </output>
          <label class="quality-control" title="Graphics quality">
            <span>Graphics</span>
            <select id="graphics-quality" aria-label="Graphics quality">
              <option value="low">Low</option>
              <option value="high">High</option>
              <option value="cinematic">Cinematic</option>
            </select>
          </label>
          <button type="button" id="btn-start" class="btn primary">Engage</button>
          <button type="button" id="btn-reset" class="btn">Reset</button>
          <button type="button" id="btn-pause" class="btn" disabled>Pause</button>
          <button
            type="button"
            id="btn-sound"
            class="btn active"
            aria-pressed="true"
            title="Mute simulator audio"
          >
            Sound on
          </button>
        </div>
      </header>

      <aside class="telemetry">
        <h2>Telemetry</h2>
        <dl id="telemetry-grid"></dl>
        <p id="phase-line" class="phase-line">STANDBY</p>
        <p id="alarm-line" class="alarm-line" hidden></p>
      </aside>

      <aside class="fault-panel">
        <h2>Inject fault</h2>
        <div id="fault-buttons" class="fault-buttons"></div>
        <p class="fault-hint">Arm faults before or during descent.</p>
      </aside>

      <div class="camera-dock">
        <div class="camera-modes" id="camera-modes" role="group" aria-label="Camera views"></div>
        <p id="camera-hint" class="camera-hint">Chase camera</p>
      </div>

      <footer class="status-strip">
        <span id="status-text">Press Engage to begin powered descent.</span>
        <span id="clock-text">T+0.0s</span>
      </footer>

      <div id="a11y-announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
